<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5A8E"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Gear teeth: 8 buah, setiap 45° -->
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(0   50 50)"/>
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(45  50 50)"/>
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(90  50 50)"/>
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(135 50 50)"/>
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(180 50 50)"/>
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(225 50 50)"/>
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(270 50 50)"/>
  <rect x="44.5" y="7" width="11" height="14" rx="3" fill="white" transform="rotate(315 50 50)"/>

  <!-- Gear body circle (menutupi dasar gigi agar seamless) -->
  <circle cx="50" cy="50" r="33" fill="white"/>

  <!-- Lubang tengah gear -->
  <circle cx="50" cy="50" r="13" fill="url(#bg)"/>

  <!-- Titik kecil aksen di tengah -->
  <circle cx="50" cy="50" r="4" fill="white" opacity="0.6"/>
</svg>
