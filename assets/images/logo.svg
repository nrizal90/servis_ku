<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5A8E"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="3" y="3" width="94" height="94" rx="20"
        fill="none" stroke="white" stroke-width="0.5" opacity="0.12"/>

  <!-- Wrench handle (rotated rectangle) -->
  <rect x="8" y="43" width="84" height="14" rx="7"
        fill="white" transform="rotate(-45 50 50)"/>

  <!-- Ring end of wrench – top-right -->
  <circle cx="78" cy="22" r="19" fill="white"/>
  <!-- Hole in ring -->
  <circle cx="78" cy="22" r="10" fill="#1C3660"/>

  <!-- Accent dot – bottom-left handle end -->
  <circle cx="22" cy="78" r="7" fill="white" opacity="0.35"/>
</svg>
