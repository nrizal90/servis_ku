name: servisku
description: "Aplikasi pencatatan servis kendaraan bermotor. Pantau jadwal servis, STNK, dan ganti plat dengan mudah."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  flutter_riverpod: ^2.4.0
  go_router: ^14.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.0
  flutter_local_notifications: ^18.0.0
  permission_handler: ^11.3.0
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
